<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRATE — YouTube MP3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── TOKENS ───────────────────────────────── */
    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --border:   #222222;
      --border2:  #2e2e2e;
      --text:     #e8e8e8;
      --muted:    #555;
      --accent:   #ff4d00;
      --accent2:  #ff8c42;
      --green:    #39d353;
      --red:      #ff4444;
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono:    'DM Mono', monospace;
      --font-body:    'DM Sans', sans-serif;
    }

    /* ── RESET ────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE ────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ───────────────────────────────── */
    .wrap { max-width: 860px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    /* ── HEADER ───────────────────────────────── */
    header {
      padding: 48px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 72px;
      letter-spacing: 6px;
      line-height: 1;
      color: var(--text);
      position: relative;
      display: inline-block;
    }
    .logo span {
      color: var(--accent);
    }
    .tagline {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* ── NAV TABS ─────────────────────────────── */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .tab-btn {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 12px 24px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .2s, border-color .2s;
    }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-btn:hover:not(.active) { color: var(--text); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── CARD ─────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 28px;
      margin-bottom: 20px;
    }
    .card-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── FORM ─────────────────────────────────── */
    .input-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }
    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 12px 16px;
      border-radius: 3px;
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    .btn {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 12px 22px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: .88; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }
    .btn-sm { padding: 7px 14px; font-size: 10px; }

    /* ── QUALITY SELECTOR ─────────────────────── */
    .quality-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      align-items: center;
    }
    .quality-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-right: 4px;
    }
    .q-btn {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 5px 14px;
      border-radius: 2px;
      border: 1px solid var(--border2);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .q-btn.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── INFO PREVIEW ─────────────────────────── */
    #info-preview {
      margin-top: 16px;
      display: none;
    }
    .info-box {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-left: 3px solid var(--accent);
      padding: 14px 16px;
      border-radius: 2px;
    }
    .info-title {
      font-weight: 500;
      margin-bottom: 4px;
    }
    .info-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
    }

    /* ── PROGRESS ─────────────────────────────── */
    #progress-section {
      display: none;
      margin-top: 24px;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .progress-status {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 1px;
    }
    .progress-pct {
      font-family: var(--font-display);
      font-size: 28px;
      color: var(--text);
    }
    .progress-bar-wrap {
      height: 3px;
      background: var(--border2);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      width: 0%;
      transition: width .3s ease;
    }
    .log-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 12px 14px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.8;
    }

    /* ── FILE LIST ────────────────────────────── */
    .file-list { display: flex; flex-direction: column; gap: 8px; }
    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      transition: border-color .15s;
    }
    .file-item:hover { border-color: var(--border2); }
    .file-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    .file-dot.pending { background: var(--accent); animation: pulse 1s infinite; }
    .file-name {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-size {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .file-dl {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      flex-shrink: 0;
      padding: 4px 10px;
      border: 1px solid var(--accent);
      border-radius: 2px;
      transition: background .15s;
    }
    .file-dl:hover { background: var(--accent); color: #fff; }

    /* ── HISTORY ──────────────────────────────── */
    .history-item {
      padding: 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      margin-bottom: 8px;
    }
    .history-url {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }
    .history-meta {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .badge {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
    }
    .badge-green { background: rgba(57,211,83,.12); color: var(--green); border: 1px solid rgba(57,211,83,.2); }
    .badge-red   { background: rgba(255,68,68,.12);  color: var(--red);   border: 1px solid rgba(255,68,68,.2); }
    .history-date {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── EMPTY STATE ──────────────────────────── */
    .empty {
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 2px;
    }

    /* ── ANIMATIONS ───────────────────────────── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn .3s ease forwards; }

    /* ── VINYL DECO ───────────────────────────── */
    .vinyl {
      position: fixed;
      right: -80px;
      top: 40px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 40px solid #161616;
      outline: 1px solid #1e1e1e;
      opacity: .25;
      animation: spin 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    .vinyl::after {
      content: '';
      position: absolute;
      inset: 20%;
      border-radius: 50%;
      background: #0a0a0a;
      border: 8px solid #1a1a1a;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SCROLLBAR ────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>

<div class="vinyl"></div>

<div class="wrap">
  <header>
    <div class="logo">CRA<span>T</span>E</div>
    <div class="tagline">YouTube Music → MP3 &nbsp;·&nbsp; Local Downloader</div>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('download')">Download</button>
    <button class="tab-btn" onclick="switchTab('library')">Biblioteca</button>
    <button class="tab-btn" onclick="switchTab('history')">Histórico</button>
  </div>

  <!-- ── TAB: DOWNLOAD ── -->
  <div id="tab-download" class="tab-panel active">
    <div class="card">
      <div class="card-label">Cole a URL</div>
      <div class="input-row">
        <input type="text" id="url-input" placeholder="https://music.youtube.com/watch?v=... ou playlist" />
        <button class="btn btn-ghost" onclick="fetchInfo()">Verificar</button>
      </div>

      <div class="quality-row">
        <span class="quality-label">Qualidade</span>
        <button class="q-btn" onclick="setQuality('128')">128 kbps</button>
        <button class="q-btn selected" onclick="setQuality('192')">192 kbps</button>
        <button class="q-btn" onclick="setQuality('320')">320 kbps</button>
      </div>
    </div>

    <!-- Info Preview -->
    <div id="info-preview">
      <div class="info-box fade-in">
        <div class="info-title" id="preview-title">—</div>
        <div class="info-meta" id="preview-meta">—</div>
      </div>
      <div style="margin-top:12px;">
        <button class="btn btn-primary" onclick="startDownload()">⬇ Baixar Agora</button>
      </div>
    </div>

    <!-- Progress -->
    <div id="progress-section">
      <div class="progress-header">
        <span class="progress-status" id="prog-status">BAIXANDO...</span>
        <span class="progress-pct" id="prog-pct">0%</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="prog-bar"></div>
      </div>
      <div class="log-box" id="log-box"></div>

      <!-- Files appearing during download -->
      <div id="live-files" style="margin-top:16px;" class="file-list"></div>
    </div>
  </div>

  <!-- ── TAB: LIBRARY ── -->
  <div id="tab-library" class="tab-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <div class="card-label" style="margin:0">Arquivos baixados</div>
      <button class="btn btn-ghost btn-sm" onclick="loadLibrary()">↻ Atualizar</button>
    </div>
    <div id="library-list" class="file-list">
      <div class="empty">— CARREGANDO —</div>
    </div>
  </div>

  <!-- ── TAB: HISTORY ── -->
  <div id="tab-history" class="tab-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <div class="card-label" style="margin:0">Downloads recentes</div>
      <button class="btn btn-ghost btn-sm" onclick="clearHistory()">Limpar</button>
    </div>
    <div id="history-list">
      <div class="empty">— SEM HISTÓRICO —</div>
    </div>
  </div>
</div>

<script>
  let selectedQuality = '192';
  let currentJobId = null;
  let currentInfo = null;

  // ── TABS ──────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.target.classList.add('active');
    if (name === 'library') loadLibrary();
    if (name === 'history') loadHistory();
  }

  // ── QUALITY ───────────────────────────────────
  function setQuality(q) {
    selectedQuality = q;
    document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('selected'));
    event.target.classList.add('selected');
  }

  // ── FETCH INFO ────────────────────────────────
  async function fetchInfo() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;
    const preview = document.getElementById('info-preview');
    preview.style.display = 'none';
    document.getElementById('preview-title').textContent = 'Verificando...';

    try {
      const res = await fetch('/api/info', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      if (data.error) { alert('Erro: ' + data.error); return; }

      currentInfo = data;
      document.getElementById('preview-title').textContent = data.title || 'Sem título';
      document.getElementById('preview-meta').textContent =
        data.isPlaylist
          ? `Playlist · ${data.count} música${data.count > 1 ? 's' : ''}`
          : 'Música individual';

      preview.style.display = 'block';
    } catch (e) {
      alert('Falha ao conectar com o servidor.');
    }
  }

  // Enter key triggers verify
  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchInfo();
  });

  // ── START DOWNLOAD ────────────────────────────
  async function startDownload() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;

    // Show progress
    document.getElementById('progress-section').style.display = 'block';
    document.getElementById('info-preview').style.display = 'none';
    document.getElementById('live-files').innerHTML = '';
    document.getElementById('log-box').innerHTML = '';
    setProgress(0, 'BAIXANDO...');

    try {
      const res = await fetch('/api/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, quality: selectedQuality })
      });
      const data = await res.json();
      if (data.error) { alert(data.error); return; }

      currentJobId = data.jobId;
      listenProgress(data.jobId);
    } catch (e) {
      alert('Erro ao iniciar download.');
    }
  }

  // ── SSE PROGRESS ──────────────────────────────
  function listenProgress(jobId) {
    const es = new EventSource(`/api/progress/${jobId}`);

    es.onmessage = (e) => {
      const msg = JSON.parse(e.data);

      if (msg.type === 'progress') {
        setProgress(msg.percent, 'BAIXANDO...');
      }

      if (msg.type === 'file') {
        addLiveFile(msg.fileName, msg.filePath);
        appendLog('✓ ' + msg.fileName);
      }

      if (msg.type === 'log') {
        appendLog(msg.message);
      }

      if (msg.type === 'done') {
        setProgress(100, 'CONCLUÍDO');
        es.close();
      }

      if (msg.type === 'error') {
        setProgress(0, 'ERRO');
        appendLog('❌ ' + msg.message);
        es.close();
      }
    };
  }

  function setProgress(pct, status) {
    document.getElementById('prog-pct').textContent = Math.round(pct) + '%';
    document.getElementById('prog-bar').style.width = pct + '%';
    document.getElementById('prog-status').textContent = status;
  }

  function appendLog(msg) {
    const box = document.getElementById('log-box');
    box.innerHTML += `<div>${msg}</div>`;
    box.scrollTop = box.scrollHeight;
  }

  function addLiveFile(name, url) {
    const list = document.getElementById('live-files');
    const clean = name.replace(/^[a-f0-9-]+_\d+_/, '').replace('.mp3', '');
    list.innerHTML += `
      <div class="file-item fade-in">
        <div class="file-dot"></div>
        <div class="file-name">${clean}</div>
        <a href="${url}" download class="file-dl">⬇ MP3</a>
      </div>`;
  }

  // ── LIBRARY ───────────────────────────────────
  async function loadLibrary() {
    const list = document.getElementById('library-list');
    list.innerHTML = '<div class="empty">— CARREGANDO —</div>';
    try {
      const res = await fetch('/api/files');
      const files = await res.json();
      if (!files.length) { list.innerHTML = '<div class="empty">— NENHUM ARQUIVO —</div>'; return; }

      list.innerHTML = files.map(f => {
        const name = f.name.replace(/^[a-f0-9-]+_\d+_/, '').replace('.mp3', '');
        const size = (f.size / (1024 * 1024)).toFixed(1) + ' MB';
        return `
          <div class="file-item">
            <div class="file-dot"></div>
            <div class="file-name">${name}</div>
            <div class="file-size">${size}</div>
            <a href="${f.url}" download class="file-dl">⬇ MP3</a>
          </div>`;
      }).join('');
    } catch (e) {
      list.innerHTML = '<div class="empty">— ERRO AO CARREGAR —</div>';
    }
  }

  // ── HISTORY ───────────────────────────────────
  async function loadHistory() {
    const list = document.getElementById('history-list');
    try {
      const res = await fetch('/api/history');
      const items = await res.json();
      if (!items.length) { list.innerHTML = '<div class="empty">— SEM HISTÓRICO —</div>'; return; }

      list.innerHTML = items.map(h => {
        const date = new Date(h.date).toLocaleString('pt-BR');
        return `
          <div class="history-item">
            <div class="history-url">${h.url}</div>
            <div class="history-meta">
              <span class="badge badge-green">${h.status}</span>
              <span class="badge" style="background:rgba(255,77,0,.1);color:var(--accent);border:1px solid rgba(255,77,0,.2)">${h.quality} kbps</span>
              <span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">${h.files.length} arquivo${h.files.length !== 1 ? 's' : ''}</span>
              <span class="history-date">${date}</span>
            </div>
          </div>`;
      }).join('');
    } catch (e) {
      list.innerHTML = '<div class="empty">— ERRO —</div>';
    }
  }

  async function clearHistory() {
    await fetch('/api/history', { method: 'DELETE' });
    loadHistory();
  }
</script>
</body>
</html>
